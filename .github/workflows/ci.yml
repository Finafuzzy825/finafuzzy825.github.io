name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  security:
    name: Security audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.2.2
      - name: Audit production dependencies
        run: pnpm audit --prod --audit-level high --registry https://registry.npmjs.org

  quality:
    name: Build and test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: zgcllm_test
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d zgcllm_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/zgcllm_test
      NEXT_PUBLIC_SITE_URL: https://www.zgcllm.org.cn
      PAYLOAD_SECRET: ci-only-secret-that-is-not-used-in-production
      PAYLOAD_TEST_MODE: 'true'
      TEST_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/zgcllm_test
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.2.2
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          cache: pnpm
          node-version: 22
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Generate Payload types
        run: pnpm generate:types
      - name: Verify generated types are committed
        run: git diff --exit-code -- src/payload-types.ts
      - name: Check types
        run: pnpm typecheck
      - name: Lint
        run: pnpm lint
      - name: Run unit tests
        run: pnpm test
      - name: Run integration tests
        run: pnpm test:int
      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium
      - name: Run end-to-end tests
        run: pnpm test:e2e
      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
          retention-days: 7
      - name: Build production bundle
        run: pnpm build
